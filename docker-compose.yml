services:
  backend:
    build: ./backend
    container_name: backend
    expose:
      - "5000"

  frontend:
    build: ./frontend
    container_name: frontend
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
